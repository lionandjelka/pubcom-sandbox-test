# ISSC PubCom label taxonomy — mirrors the Publication Review Manual (v1.0).
# Apply one Category, one Class, one Timeline, and the current Status to each review PR.

# --- Category (number) ---
- name: "Mandatory"
  color: "b60205"
  description: "Category 1 — ISSC is an author; collaboration-wide review required"
- name: "Encouraged"
  color: "d93f0b"
  description: "Category 2 — within remit, did not use ISSC resources; review encouraged"
- name: "Optional"
  color: "fbca04"
  description: "Category 3 — ISSC review offered as a service"

# --- Class (letter) ---
- name: "class: a — paper"
  color: "0e8a16"
  description: "Journal article, White Paper, Research Note"
- name: "class: b — peer-reviewed conference"
  color: "0e8a16"
  description: "Proceedings or special paper"
- name: "class: c — LSST web resource"
  color: "0e8a16"
  description: "Blog, tech notes, tutorials on official LSST resources"
- name: "class: d — scientific report"
  color: "0e8a16"
  description: "Dissertation, thesis, book/review chapter, project"
- name: "class: e — data/software deliverable"
  color: "0e8a16"
  description: "Versioned software, data release, documentation"
- name: "class: f — non-peer-reviewed conference"
  color: "0e8a16"
  description: "Oral or poster presentation"
- name: "class: g — book/review"
  color: "0e8a16"
  description: "Book, chapter, field summary, review section"

# --- Timeline stream (roman numeral) ---
- name: "Accelerated"
  color: "1d76db"
  description: "Stream i — 1-week First Review"
- name: "Standard"
  color: "1d76db"
  description: "Stream ii — 2-week First Review"
- name: "Extended"
  color: "1d76db"
  description: "Stream iii — 3-week First Review"

# --- Status ---
- name: "status: registered"
  color: "c5def5"
  description: "Announced; Paper Handler not yet assigned / PR not yet open"
- name: "status: first review"
  color: "c5def5"
  description: "First Review period open"
- name: "status: author response"
  color: "c5def5"
  description: "Authors responding / revising"
- name: "status: follow-up review"
  color: "c5def5"
  description: "Follow-up Review period open"
- name: "status: released"
  color: "c5def5"
  description: "Paper Handler released; awaiting Chair decision"
- name: "status: concluded"
  color: "0e8a16"
  description: "Chair decision recorded; ISSC attribution/acknowledgement added"
